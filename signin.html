<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sign In - Shivam Sync</title>

  <style>
    *{ margin:0; padding:0; box-sizing:border-box; }

    body{
      background:#1f1d1d;
      color:white;
      font-family:Arial,sans-serif;
      height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
    }

    .box{
      width:380px;
      background:#2a2727;
      padding:42px;
      border-radius:18px;
      text-align:center;
      border:1px solid #333;
    }

    .brand{
      font-size:18px;
      font-weight:400;
      letter-spacing:3px;
      color:#bdbdbd;
      margin-bottom:18px;
      text-transform:uppercase;
    }

    h1{
      margin-bottom:25px;
      font-weight:400;
      font-size:34px;
    }

    input{
      width:100%;
      padding:14px;
      margin-bottom:16px;
      background:#1f1d1d;
      border:1px solid #444;
      border-radius:10px;
      color:white;
      font-size:15px;
    }

    button{
      width:100%;
      padding:14px;
      border:none;
      border-radius:10px;
      background:white;
      color:black;
      cursor:pointer;
      font-size:15px;
    }

    .link{
      margin-top:18px;
      color:#aaa;
      font-size:14px;
    }

    .link a{
      color:white;
      text-decoration:none;
    }

    #message{
      margin-top:18px;
      color:#7dff9b;
      font-size:14px;
    }
  </style>
</head>

<body>

  <div class="box">
    <h2 class="brand">Shivam Sync</h2>
    <h1>Sign In</h1>

    <input type="email" id="email" placeholder="Email">
    <input type="password" id="password" placeholder="Password">

    <button onclick="signin()">Sign In</button>

    <div class="link">
      Don’t have an account?
      <a href="signup.html">Sign Up</a>
    </div>

    <div id="message"></div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

    import {
      getAuth,
      signInWithEmailAndPassword
    } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

    const firebaseConfig = {
      apiKey: "AIzaSyBhHsd8Pc-m_0AtUqNM--XVfeDb8yFD0aQ",
      authDomain: "shivam-sync.firebaseapp.com",
      projectId: "shivam-sync",
      storageBucket: "shivam-sync.firebasestorage.app",
      messagingSenderId: "575679682697",
      appId: "1:575679682697:web:94f70091ae9c98ff118e58"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);

    window.signin = function(){
      const email = document.getElementById("email").value;
      const password = document.getElementById("password").value;

      signInWithEmailAndPassword(auth,email,password)
      .then(() => {
        document.getElementById("message").innerHTML = "Signed in successfully.";
        setTimeout(() => {
          window.location.href = "index.html";
        }, 1000);
      })
      .catch((error) => {
        document.getElementById("message").innerHTML = error.message;
      });
    }
  </script>

</body>
</html>
